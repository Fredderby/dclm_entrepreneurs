services:
  dclm-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "9000:8000"
    environment:
      - PORT=8000
      - CORS_ORIGINS=http://127.0.0.1:3001,http://localhost:3001
    env_file:
      - ./backend/.env
    networks:
      - dclm-net

  dclm-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:80"
    environment:
      - REACT_APP_API_URL=/api
    depends_on:
      - dclm-backend
    networks:
      - dclm-net

networks:
  dclm-net:
    driver: bridge

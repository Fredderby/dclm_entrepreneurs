version: "3.8"

services:
  app:
    build: .
    restart: always
    ports:
      - "8099:8099"
    # ✅ Only keep Google Sheets environment variables (no DB anymore)
    environment:
      - PROJECT_ID=${PROJECT_ID}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - PRIVATE_KEY_ID=${PRIVATE_KEY_ID}
      - CLIENT_EMAIL=${CLIENT_EMAIL}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_X509_CERT_URL=${CLIENT_X509_CERT_URL}
      - SPREADSHEET_ID=${SPREADSHEET_ID}

networks:
  default:
    name: entrepreneur-dclm-a1spks_default
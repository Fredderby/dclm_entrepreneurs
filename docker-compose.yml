
services:
  dclm-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dclm-backend
    restart: always
    ports:
      - "9000:8000"
    environment:
      - PORT=8000
      - CORS_ORIGINS=http://localhost:3001,http://your-domain.com
    volumes:
      - ./backend:/app
    networks:
      - dclm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3

  dclm-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dclm-frontend
    restart: always
    ports:
      - "3001:80"
    environment:
      - REACT_APP_API_URL=http://your-server-ip:9000
    depends_on:
      - dclm-backend
    networks:
      - dclm-network

networks:
  dclm-network:
    driver: bridge
